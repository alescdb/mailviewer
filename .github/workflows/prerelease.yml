name: prerelease

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  flatpak:
    name: "flatpak build"
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Set short SHA
        id: short_sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Generate flatpak sources (python container)
        uses: docker://python:3.11
        with:
          args: >
            bash -lc "set -e;
            pip install --no-cache-dir aiohttp toml tomlkit &&
            wget -q https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/refs/heads/master/cargo/flatpak-cargo-generator.py &&
            python3 flatpak-cargo-generator.py -o mailviewer-sources.json Cargo.lock"

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: mailviewer-${{ matrix.variant.arch }}-${{ steps.short_sha.outputs.short }}.flatpak
          manifest-path: io.github.alescdb.mailviewer.json
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-${{ matrix.variant.arch }}
          if-no-files-found: error
          path: "*.flatpak"

  prerelease:
    name: "prerelease"
    needs: [flatpak]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download flatpak artifacts into workspace root
        uses: actions/download-artifact@v4
        with:
          pattern: flatpak-*
          merge-multiple: true
          path: .

      - uses: dciborow/action-github-releases@v1.0.1
        with:
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          prerelease: true
          automatic_release_tag: prerelease
          title: prerelease
          files: |
            LICENSE
            *.flatpak
