name: prerelease

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  flatpak:
    name: "flatpak build"
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: set GITHUB_SHA 
        id: short_sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        name: flatpak-builder
        with:
          bundle: mailviewer-${{ matrix.variant.arch }}-${{ steps.short_sha.outputs.short }}.flatpak
          manifest-path: io.github.alescdb.mailviewer.json
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}

      - uses: actions/upload-artifact@v4
        name: upload
        with:
          name: flatpak-${{ matrix.variant.arch }}
          if-no-files-found: error
          path: "*.flatpak"

  prerelease:
    name: "prerelease"
    needs: [flatpak]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: download flatpak artifacts into workspace root
        uses: actions/download-artifact@v4
        with:
          pattern: flatpak-*
          merge-multiple: true
          path: .

      - name: pre-release tag
        uses: dciborow/action-github-releases@v1.0.1
        with:
          repo_token: "${{ secrets.RELEASE_TOKEN }}"
          prerelease: true
          automatic_release_tag: "latest"
          title: "Pre-release"
          files: |
            LICENSE
            *.flatpak